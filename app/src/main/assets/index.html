<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>LiveTalk</title>
<style>
:root{--bg:#0c1220;--panel:#141c2e;--panel2:#1b2740;--line:#26334f;--ink:#e8eef8;--dim:#8ea0bd;
--a:#39d3c0;--a-soft:rgba(57,211,192,.14);--b:#ffb648;--b-soft:rgba(255,182,72,.14);--danger:#ff6b7a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"Roboto",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:8px;padding:12px 14px 6px}
.logo{font-weight:800;font-size:17px}.logo span{color:var(--a)}
.ver{font-size:10px;color:var(--dim);font-weight:600}
#status{margin-left:auto;font-size:11.5px;color:var(--dim);display:flex;align-items:center;gap:6px}
#dot{width:8px;height:8px;border-radius:50%;background:#42506b;transition:.2s}
#dot.on{background:var(--a);box-shadow:0 0 8px var(--a)}
#dot.tts{background:var(--b);box-shadow:0 0 8px var(--b)}
.langbar{display:flex;align-items:center;gap:6px;padding:4px 12px 6px}
.langchip{flex:1;display:flex;align-items:center;gap:6px;justify-content:center;background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:8px 6px;min-width:0}
.langchip.mic{border-color:currentColor}
.cdot{width:7px;height:7px;border-radius:50%;flex:none}
#chipA{color:var(--a)}#chipB{color:var(--b)}
#chipA .cdot{background:var(--a)}#chipB .cdot{background:var(--b)}
.langchip select{appearance:none;-webkit-appearance:none;background:transparent;border:0;color:var(--ink);font:inherit;font-size:13px;font-weight:600;text-align:center;max-width:100%;outline:none}
#swap{flex:none;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);background:var(--panel);color:var(--dim);font-size:15px}
.modebar{display:flex;gap:6px;padding:0 12px 6px}
.mode{flex:1;font-size:12.5px;font-weight:700;border-radius:10px;padding:8px 6px;border:1.5px solid var(--line);background:var(--panel);color:var(--dim)}
.mode.on{color:#0c1220;background:linear-gradient(90deg,var(--a),#7fe0d2);border-color:transparent}
#modeManual.on{background:linear-gradient(90deg,#ffd08a,var(--b))}
.settings{padding:0 12px 6px;display:flex;flex-direction:column;gap:6px}
.setrow{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 10px}
.setrow label{font-size:11.5px;color:var(--dim);white-space:nowrap}
.setrow input[type=range]{flex:1;accent-color:var(--a)}
.setrow .val{font-size:11.5px;color:var(--a);font-weight:700;min-width:30px;text-align:right}
.toggle{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.toggle button{font-size:11px;font-weight:700;padding:6px 10px;border:0;background:var(--panel2);color:var(--dim)}
.toggle button.on{background:var(--a);color:#0c1220}
#micbar{height:5px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:2px}
#micfill{height:100%;width:0;background:linear-gradient(90deg,var(--a),var(--b));transition:width .08s}
#chat{flex:1;overflow-y:auto;padding:6px 12px 10px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:86%;padding:8px 11px;border-radius:14px;line-height:1.45;word-break:break-word}
.msg .src{font-size:12px;color:var(--dim);margin-bottom:3px}
.msg .dst{font-size:15px;font-weight:600;white-space:pre-line}
.msg .meta{font-size:10px;color:var(--dim);margin-top:4px;opacity:.8}
.msg.A{align-self:flex-start;background:var(--a-soft);border:1px solid rgba(57,211,192,.35);border-bottom-left-radius:4px}
.msg.A .dst{color:var(--a)}
.msg.B{align-self:flex-end;background:var(--b-soft);border:1px solid rgba(255,182,72,.35);border-bottom-right-radius:4px}
.msg.B .dst{color:var(--b)}
#interim{align-self:center;font-size:13px;color:var(--dim);font-style:italic;padding:2px 8px;display:none}
#empty{margin:auto;text-align:center;color:var(--dim);font-size:12.5px;line-height:1.7;padding:0 24px}
#empty b{color:var(--ink)}
#talkbar{display:none;gap:8px;padding:8px 12px;background:var(--panel);border-top:1px solid var(--line)}
.talk{flex:1;padding:15px 8px;border-radius:14px;font:inherit;font-size:15px;font-weight:700;border:2px solid var(--line);background:var(--panel2);color:var(--dim)}
#talkA.on{border-color:var(--a);color:var(--a);background:var(--a-soft);box-shadow:0 0 14px rgba(57,211,192,.35)}
#talkB.on{border-color:var(--b);color:var(--b);background:var(--b-soft);box-shadow:0 0 14px rgba(255,182,72,.35)}
.talk:active{transform:scale(.97)}
.controls{display:flex;align-items:center;justify-content:space-around;padding:10px 18px 16px;border-top:1px solid var(--line);background:var(--panel)}
.side{width:52px;height:52px;border-radius:16px;border:1.5px solid var(--line);background:var(--panel2);color:var(--dim);font-size:20px}
.side:active{transform:scale(.94)}
#micBtn{width:72px;height:72px;border-radius:50%;border:0;font-size:28px;color:#07131f;background:linear-gradient(135deg,var(--a),#22b9a6);box-shadow:0 6px 22px rgba(57,211,192,.4)}
#micBtn.stop{background:linear-gradient(135deg,#ff8a96,var(--danger));color:#fff}
.lbl{font-size:10px;color:var(--dim);text-align:center;margin-top:3px}
.ctrlwrap{display:flex;flex-direction:column;align-items:center}
#toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 16px;border-radius:20px;font-size:13px;display:none;z-index:10;max-width:90%;text-align:center}
</style>
</head>
<body>
<header>
  <div class="logo">Live<span>Talk</span> <span class="ver" id="ver">app</span></div>
  <div id="status"><div id="dot"></div><span id="stTxt">Sẵn sàng</span></div>
</header>

<div class="langbar">
  <div class="langchip" id="chipA"><span class="cdot"></span><select id="selA"></select></div>
  <button id="swap">⇄</button>
  <div class="langchip" id="chipB"><span class="cdot"></span><select id="selB"></select></div>
</div>

<div class="modebar">
  <button id="modeAuto" class="mode on">🌐 Tự động</button>
  <button id="modeManual" class="mode">👆 Thủ công</button>
</div>

<div class="settings">
  <div class="setrow">
    <label>Độ nhạy mic</label>
    <input type="range" id="sens" min="0.5" max="3" step="0.1" value="1.5">
    <span class="val" id="sensVal">1.5</span>
  </div>
  <div id="micbar"><div id="micfill"></div></div>
  <div class="setrow">
    <label>Nhận dạng</label>
    <div class="toggle"><button id="onl" class="on">Online</button><button id="ofl">Offline</button></div>
  </div>
</div>

<div id="chat">
  <div id="empty">
    <b>LiveTalk (app v13)</b><br>
    Nhấn nút micro để bắt đầu. Hai nút ngôn ngữ hiện ra:<br>
    <b>ai sắp nói thì chạm nút tiếng của mình rồi nói.</b><br>
    Nói xong ngừng lại — máy dịch, hiện phụ đề và đọc loa.<br>
    Cách này chạy chuẩn 2 chiều, không lẫn tiếng.
  </div>
  <div id="interim"></div>
</div>

<div id="talkbar">
  <button id="talkA" class="talk">🇻🇳 Tiếng Việt</button>
  <button id="talkB" class="talk">🇺🇸 English</button>
</div>

<div class="controls">
  <div class="ctrlwrap"><button class="side" id="clearBtn">🗑</button><div class="lbl">Xóa</div></div>
  <div class="ctrlwrap"><button id="micBtn">🎙</button><div class="lbl" id="micLbl">Bắt đầu</div></div>
  <div class="ctrlwrap"><button class="side" id="saveBtn">💾</button><div class="lbl">Lưu</div></div>
</div>
<div id="toast"></div>

<script>
/* ═══════════ NGÔN NGỮ ═══════════ */
const LANGS=[
  {c:'vi',b:'vi-VN',n:'🇻🇳 Tiếng Việt'},
  {c:'en',b:'en-US',n:'🇺🇸 English'},
  {c:'zh',b:'zh-CN',n:'🇨🇳 中文'},
  {c:'ja',b:'ja-JP',n:'🇯🇵 日本語'},
  {c:'ko',b:'ko-KR',n:'🇰🇷 한국어'},
  {c:'th',b:'th-TH',n:'🇹🇭 ไทย'},
  {c:'fr',b:'fr-FR',n:'🇫🇷 Français'},
  {c:'de',b:'de-DE',n:'🇩🇪 Deutsch'},
  {c:'ru',b:'ru-RU',n:'🇷🇺 Русский'},
  {c:'es',b:'es-ES',n:'🇪🇸 Español'},
  {c:'km',b:'km-KH',n:'🇰🇭 ខ្មែរ'},
];
const byCode=c=>LANGS.find(l=>l.c===c)||LANGS.find(l=>c&&c.startsWith(l.c))||LANGS[0];
const $=id=>document.getElementById(id);
const selA=$('selA'),selB=$('selB'),chat=$('chat'),interimEl=$('interim');
LANGS.forEach(l=>{selA.add(new Option(l.n,l.c));selB.add(new Option(l.n,l.c));});
selA.value='vi';selB.value='en';

const NATIVE=!!(window.Native&&window.Native.startListen);
$('ver').textContent=NATIVE?'app v13':'web v13';

/* ═══════════ TRẠNG THÁI ═══════════ */
let running=false;       // đang bật mic tổng
let speaking=false;      // đang đọc loa
let autoMode=true;
let micLang='vi';        // tiếng mic ĐANG nghe (mã ngắn)
let busy=false;          // đang dịch 1 câu (chặn chồng chéo)
let pending='',lastPartial='';
let silenceTimer=null;   // dùng cho web fallback
let lastText='',lastAt=0;
const log=[];

const norm=s=>(s||'').toLowerCase().replace(/[^\p{L}\p{N} ]/gu,' ').replace(/\s+/g,' ').trim();
function setStatus(t,m){$('stTxt').textContent=t;$('dot').className=m||'';}
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2800);}
function refreshChips(){$('chipA').classList.toggle('mic',micLang===selA.value);$('chipB').classList.toggle('mic',micLang===selB.value);}
function scrollBottom(){chat.scrollTop=chat.scrollHeight;}
refreshChips();

/* ═══════════ NHẬN DẠNG: Native hoặc Web ═══════════ */
const WebSR=window.SpeechRecognition||window.webkitSpeechRecognition;
let webRecog=null;

function listenStart(){
  if(!running||speaking||busy)return;
  const bcp=byCode(micLang).b;
  if(NATIVE){ window.Native.startListen(bcp); }
  else{
    if(!WebSR){toast('Trình duyệt không hỗ trợ nhận dạng');return;}
    try{webRecog&&webRecog.abort();}catch(e){}
    webRecog=new WebSR();
    webRecog.lang=bcp;webRecog.continuous=true;webRecog.interimResults=true;
    webRecog.onresult=ev=>{
      let it='',fn='';
      for(let i=ev.resultIndex;i<ev.results.length;i++){const r=ev.results[i];if(r.isFinal)fn+=r[0].transcript;else it+=r[0].transcript;}
      if(fn.trim())gotFinal(fn.trim());else if(it)gotPartial(it.trim());
    };
    webRecog.onend=()=>{if(running&&!speaking&&!busy)setTimeout(listenStart,150);};
    try{webRecog.start();}catch(e){}
  }
  if(!speaking)setStatus('Đang nghe: '+byCode(micLang).n.replace(/^\S+\s/,''),'on');
}
function listenStop(){
  if(NATIVE){window.Native.stopListen();}
  else{try{webRecog&&webRecog.abort();}catch(e){}webRecog=null;}
}
function ttsPlay(text,langC){
  const bcp=byCode(langC).b;
  if(NATIVE){window.Native.speak(text,bcp);}
  else{
    if(!('speechSynthesis'in window)){ttsEnded();return;}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang=bcp;
    u.onend=u.onerror=()=>ttsEnded();
    speechSynthesis.speak(u);
  }
}

/* ═══════════ SỰ KIỆN TỪ NATIVE ═══════════ */
window.onNative=function(type,data){
  if(type==='partial'){ gotPartial(data.text); }
  else if(type==='final'){ gotFinal(data.text); }
  else if(type==='ttsend'){ ttsEnded(); }
  else if(type==='rms'){ $('micfill').style.width=Math.max(0,Math.min(100,(data.v/10)*100))+'%'; }
  else if(type==='listening'){ if(!speaking&&!busy)setStatus('Đang nghe: '+byCode(micLang).n.replace(/^\S+\s/,''),'on'); }
  else if(type==='error'){
    if(data.msg==='perm')toast('Chưa cấp quyền micro — vào Cài đặt bật lại');
    else if(data.msg==='no_recognition')toast('Máy chưa có dịch vụ nhận dạng — cài "Google" từ CH Play');
  }
  else if(type==='ttsmissing'){ toast('Thiếu giọng đọc '+data.lang+' — Cài đặt → Ngôn ngữ → Đầu ra giọng nói'); }
  else if(type==='offlinefail'){ $('onl').classList.add('on');$('ofl').classList.remove('on');toast('Offline chưa có gói tiếng — đã tự chuyển Online'); }
  else if(type==='perm'){ if(data.granted&&running)listenStart(); }
};

/* ═══════════ GOM CÂU NÓI ═══════════ */
function gotPartial(text){
  if(speaking||busy)return;
  lastPartial=text;
  interimEl.textContent='… '+text;interimEl.style.display='block';scrollBottom();
  if(!NATIVE){ // web tự chốt câu sau 1.3s im lặng
    clearTimeout(silenceTimer);
    silenceTimer=setTimeout(()=>{if(lastPartial){const t=lastPartial;lastPartial='';gotFinal(t);}},1300);
  }
}
function gotFinal(text){
  if(speaking||busy)return;
  text=(text||'').trim();if(!text)return;
  if(norm(text)===norm(lastText)&&Date.now()-lastAt<4000){lastPartial='';return;} // chống lặp
  lastPartial='';clearTimeout(silenceTimer);
  lastText=text;lastAt=Date.now();
  interimEl.style.display='none';
  translateAndSpeak(text);
}

/* ═══════════ DỊCH ═══════════ */
async function gTranslate(q,tl){
  const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl='
    +encodeURIComponent(tl)+'&dt=t&q='+encodeURIComponent(q);
  const ctl=new AbortController();const to=setTimeout(()=>ctl.abort(),8000);
  try{const j=await(await fetch(url,{signal:ctl.signal})).json();
    return{text:j[0].map(s=>s[0]).join(''),detected:(j[2]||'').split('-')[0].toLowerCase()};}
  finally{clearTimeout(to);}
}

async function translateAndSpeak(text){
  busy=true;listenStop();
  const a=selA.value,b=selB.value;
  // Nguồn = tiếng mic ĐANG nghe (người dùng đã chọn qua nút talk hoặc auto luân phiên).
  // Đích = tiếng còn lại.
  const src=micLang, tl=(micLang===a)?b:a;
  try{
    const r=await gTranslate(text,tl);
    addBubble(src===a?'A':'B',text,r.text,src,tl);
    speak(r.text,tl);
  }catch(e){
    toast('Lỗi mạng khi dịch');
    busy=false;
    if(autoMode&&running)micLang=(micLang===a)?b:a;  // auto: đổi lượt
    refreshChips();updateTalk();
    if(running&&!speaking)listenStart();
  }
}

/* ═══════════ PHỤ ĐỀ ═══════════ */
function addBubble(side,text,trans,srcC,dstC){
  const emp=$('empty');if(emp)emp.remove();
  const hhmm=new Date().toTimeString().slice(0,5);
  const d=document.createElement('div');d.className='msg '+side;
  d.innerHTML='<div class="src"></div><div class="dst"></div><div class="meta"></div>';
  d.children[0].textContent=text;d.children[1].textContent=trans;
  d.children[2].textContent=byCode(srcC).n+' → '+byCode(dstC).n+' · '+hhmm;
  chat.insertBefore(d,interimEl);scrollBottom();
  log.push({t:hhmm,side,srcName:byCode(srcC).n,text,trans});
}

/* ═══════════ ĐỌC LOA ═══════════ */
function speak(text,langC){
  speaking=true;setStatus('Đang đọc bản dịch…','tts');listenStop();
  ttsPlay(text,langC);
}
function ttsEnded(){
  speaking=false;busy=false;
  // Tự động: sau khi đọc xong, đổi lượt sang tiếng KIA để bắt người kia đáp
  if(autoMode&&running){micLang=(micLang===selA.value)?selB.value:selA.value;refreshChips();updateTalk();}
  if(running)listenStart();else setStatus('Sẵn sàng','');
}

/* ═══════════ ĐIỀU KHIỂN ═══════════ */
$('micBtn').onclick=()=>{
  if(!running){
    running=true;busy=false;speaking=false;
    $('micBtn').classList.add('stop');$('micBtn').textContent='■';$('micLbl').textContent='Dừng';
    listenStart();updateTalk();
  }else stopAll();
};
function stopAll(){
  running=false;speaking=false;busy=false;pending='';lastPartial='';
  clearTimeout(silenceTimer);
  listenStop();if(NATIVE)window.Native.stopSpeak();else if('speechSynthesis'in window)speechSynthesis.cancel();
  interimEl.style.display='none';$('micfill').style.width='0';
  $('micBtn').classList.remove('stop');$('micBtn').textContent='🎙';$('micLbl').textContent='Bắt đầu';
  setStatus('Đã dừng','');updateTalk();
}
$('clearBtn').onclick=()=>{document.querySelectorAll('.msg').forEach(m=>m.remove());pending='';lastPartial='';log.length=0;interimEl.style.display='none';toast('Đã xóa');};

// Đổi mic sang tiếng vừa chọn, khởi động lại nhận dạng
function switchMic(lang){
  micLang=lang;refreshChips();updateTalk();
  if(running&&!speaking){busy=false;listenStop();setTimeout(listenStart,120);}
}
$('swap').onclick=()=>{const t=selA.value;selA.value=selB.value;selB.value=t;switchMic(selA.value);};
selA.onchange=()=>switchMic(selA.value);
selB.onchange=()=>{refreshChips();updateTalk();};
$('chipA').onclick=e=>{if(e.target.tagName!=='SELECT')switchMic(selA.value);};
$('chipB').onclick=e=>{if(e.target.tagName!=='SELECT')switchMic(selB.value);};

/* Hai nút nói to */
function updateTalk(){
  // Hiện ở CẢ hai chế độ khi đang chạy (giúp auto chọn đúng người nói)
  $('talkbar').style.display=running?'flex':'none';
  $('talkA').textContent=byCode(selA.value).n;
  $('talkB').textContent=byCode(selB.value).n;
  $('talkA').classList.toggle('on',micLang===selA.value);
  $('talkB').classList.toggle('on',micLang===selB.value);
}
$('talkA').onclick=()=>switchMic(selA.value);
$('talkB').onclick=()=>switchMic(selB.value);

$('modeAuto').onclick=()=>{autoMode=true;$('modeAuto').classList.add('on');$('modeManual').classList.remove('on');updateTalk();toast('Tự động: sau mỗi câu tự đổi lượt. Chạm nút nếu máy nghe nhầm tiếng.');};
$('modeManual').onclick=()=>{autoMode=false;$('modeManual').classList.add('on');$('modeAuto').classList.remove('on');updateTalk();toast('Thủ công: ai nói thì chạm nút tiếng của mình rồi nói.');};

/* Độ nhạy + online/offline */
$('sens').oninput=e=>{const v=parseFloat(e.target.value);$('sensVal').textContent=v.toFixed(1);if(NATIVE)window.Native.setSensitivity(v);};
if(NATIVE)window.Native.setSensitivity(1.5);
$('onl').onclick=()=>{$('onl').classList.add('on');$('ofl').classList.remove('on');if(NATIVE)window.Native.setOffline(false);toast('Online: chính xác cao, cần mạng');if(running)switchMic(micLang);};
$('ofl').onclick=()=>{$('ofl').classList.add('on');$('onl').classList.remove('on');if(NATIVE)window.Native.setOffline(true);toast('Offline: cần tải gói nhận dạng trong Cài đặt (xem hướng dẫn)');if(running)switchMic(micLang);};

/* Lưu file */
$('saveBtn').onclick=()=>{
  if(!log.length){toast('Chưa có nội dung');return;}
  let s='NỘI DUNG TRAO ĐỔI – LiveTalk\r\n'+new Date().toLocaleString('vi-VN')+'\r\n'+'='.repeat(36)+'\r\n\r\n';
  log.forEach(m=>{s+='['+m.t+'] ('+m.srcName+'):\r\n  Nói:  '+m.text+'\r\n  Dịch: '+m.trans+'\r\n\r\n';});
  const blob=new Blob(['\ufeff'+s],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='LiveTalk_'+Date.now()+'.txt';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);toast('Đã lưu file .txt');
};
</script>
</body>
</html>
